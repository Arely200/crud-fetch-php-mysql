<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Productos MVC</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 (Iconos) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    

    <link rel="stylesheet" href="../assets/css/estilos.css">
    
</head>
<body class="bg-light">
    <div class="container py-5">
        
            <div class="card-header bg-primary text-white">
                <h3 class="text-center mb-0"> CRUD de Productos - MVC</h3>
                <p class="text-center mb-0 small">Arquitectura MVC con PHP OOP + Fetch API</p>
            </div>
            <div class="card-body">
                <form id="productoForm">
                    <input type="hidden" id="productoId" name="id">
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Código del Producto</label>
                            <input type="text" class="form-control" id="codigo" name="codigo" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nombre del Producto</label>
                            <input type="text" class="form-control" id="producto" name="producto" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Precio</label>
                            <input type="number" step="0.01" class="form-control" id="precio" name="precio" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Cantidad</label>
                            <input type="number" step="1" class="form-control" id="cantidad" name="cantidad">
                        </div>
                    </div>
                    
                    <div class="mt-4 text-center">
                        <button type="button" id="btnGuardar" class="btn btn-success mx-2">
                            <i class="fas fa-save"></i> Guardar
                        </button>
                        <button type="button" id="btnModificar" class="btn btn-warning mx-2">
                            <i class="fas fa-edit"></i> Modificar
                        </button>
                        <button type="button" id="btnBuscar" class="btn btn-info mx-2">
                            <i class="fas fa-search"></i> Buscar
                        </button>
                        <button type="button" id="btnLimpiar" class="btn btn-secondary mx-2">
                            <i class="fas fa-eraser"></i> Limpiar
                        </button>
                    </div>
                </form>
            </div>
        </div>


        <div class="card shadow mt-4">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"> Lista de Productos</h4>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Código</th>
                                <th>Producto</th>
                                <th>Precio</th>
                                <th>Cantidad</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaProductos">
                            <tr><td colspan="6" class="text-center">Cargando productos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/script.js"></script>
</body>
</html>
